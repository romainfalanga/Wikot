<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wikot favicon (V18.11)
  Reproduit le logo header : carré doré arrondi + cloche de reception
  hoteliere (concierge bell) en navy. Couleurs identiques aux variables CSS
  --c-gold (#C9A961) et --c-navy (#0A1628).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond : carre dore arrondi (rounded-xl) -->
  <rect width="64" height="64" rx="14" ry="14" fill="#C9A961"/>

  <!-- Cloche de reception (fa-concierge-bell stylisee), couleur navy -->
  <g fill="#0A1628">
    <!-- Plateau / base -->
    <rect x="10" y="46" width="44" height="5" rx="2.5"/>
    <!-- Pieds -->
    <rect x="14" y="42" width="4" height="4" rx="1"/>
    <rect x="46" y="42" width="4" height="4" rx="1"/>
    <!-- Dome de la cloche -->
    <path d="M16 42 C 16 24, 48 24, 48 42 Z"/>
    <!-- Tige + bouton sur le sommet -->
    <rect x="30.5" y="14" width="3" height="6" rx="1"/>
    <circle cx="32" cy="13" r="3"/>
  </g>
</svg>
