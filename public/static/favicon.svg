<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wikot favicon (V18.12)
  Reproduit le logo header : carre dore arrondi + cloche de reception en navy.
  Couleurs identiques aux variables CSS de l'app :
    --c-gold : #C9A961
    --c-navy : #0A1628
  Design optimise pour la lisibilite a 16x16 / 32x32 px (onglet navigateur) :
  formes massives, contraste eleve, aucun detail fin.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Fond : carre dore arrondi (equivalent rounded-xl) -->
  <rect width="64" height="64" rx="12" ry="12" fill="#C9A961"/>

  <!-- Cloche de reception, navy, design simplifie et massif pour rester lisible petit -->
  <g fill="#0A1628">
    <!-- Bouton au sommet -->
    <circle cx="32" cy="14" r="4"/>
    <!-- Dome de la cloche (forme pleine arrondie) -->
    <path d="M14 44
             C 14 22, 50 22, 50 44 Z"/>
    <!-- Plateau / base -->
    <rect x="10" y="45" width="44" height="6" rx="3"/>
  </g>
</svg>
